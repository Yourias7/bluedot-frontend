<header class="app-header">
  <div class="header-left">
    <a routerLink="/" class="logo-link">
      <app-logo></app-logo>
    </a>
  </div>

  <nav class="header-nav">
    @for (route of navRoutes; track route.path + route.title) {
      <a
        [routerLink]="route.path"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{
          paths: 'exact',
          queryParams: 'ignored',
          fragment: 'ignored',
          matrixParams: 'ignored'
        }"
        class="nav-link"
      >
        {{ route.title }}
      </a>
    }
  </nav>

  <div class="header-right">
    @if (currentUserRole === 'manager') {
      <div class="user-profile">
        <p-menu
          #managerMenu
          [model]="managerOptions"
          [popup]="true"
          styleClass="user-profile-menu"
        ></p-menu>

        <button
          type="button"
          class="user-menu-button"
          (click)="managerMenu.toggle($event)"
        >
          <p-avatar
            icon="pi pi-shield"
            size="large"
            class="user-avatar-button"
          ></p-avatar>

          <span class="user-name">{{ displayUserName }}</span>
        </button>
      </div>
    }

    @if (currentUserRole === 'doctor') {
      <div class="user-profile">
        <p-menu
          #doctorMenu
          [model]="doctorOptions"
          [popup]="true"
          styleClass="user-profile-menu"
        ></p-menu>

        <button
          type="button"
          class="user-menu-button"
          (click)="doctorMenu.toggle($event)"
        >
          <p-avatar
            icon="pi pi-user"
            size="large"
            class="user-avatar-button"
          ></p-avatar>

          <span class="user-name">{{ displayUserName }}</span>
        </button>
      </div>
    }

    @if (currentUserRole === 'patient') {
      <div class="user-profile">
        <p-menu
          #patientMenu
          [model]="loggedInOptions"
          [popup]="true"
          styleClass="user-profile-menu"
        ></p-menu>

        <button
          type="button"
          class="user-menu-button"
          (click)="patientMenu.toggle($event)"
        >
          <p-avatar
            icon="pi pi-user"
            size="large"
            class="user-avatar-button"
          ></p-avatar>

          <span class="user-name">{{ displayUserName }}</span>
        </button>
      </div>
    }

    @if (currentUserRole === 'guest') {
      <div class="patient-actions">
        <button
          type="button"
          class="login-button"
          (click)="isLoginModalOpen = true"
        >
          Σύνδεση
        </button>

        <button
          type="button"
          class="register-button"
          (click)="register()"
        >
          Εγγραφή
        </button>

        <app-login
          [isOpen]="isLoginModalOpen"
          (modalClosed)="isLoginModalOpen = false"
          (loginSucceeded)="isLoginModalOpen = false"
        ></app-login>
      </div>
    }
  </div>
</header>
