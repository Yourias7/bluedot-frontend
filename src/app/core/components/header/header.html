<header class="d-flex p-2 align-items-center justify-content-center gap-4">
    <app-logo></app-logo>
    <nav class="navbar navbar-expand-lg">
        <ul class="nav">
            @for(route of navRoutes; track route) {
            <li class="nav-item">
                <a class="nav-link" [routerLink]="[route.path]" [routerLinkActive]="'active'">{{route.title}}</a>
            </li>
            }
            <li class="nav-item"><a class="nav-link">Ιατρεία κοντά μου</a></li>
            <li class="nav-item"><a class="nav-link">Σχετικά με εμάς</a></li>
            <li class="nav-item"><a class="nav-link">Βοήθεια</a></li>
        </ul>
    </nav>
    <div class="d-flex p-2 justify-content-evenly gap-2">
        <button class="btn btn-light">Σύνδεση</button>
        <button class="btn btn-dark">Εγγραφή</button>
    </div>
</header>
