<section class="doctor-results-page">
  <div class="page-header">
    <h1>Συνεργαζόμενοι ιατροί</h1>
    <p>Βρείτε τον κατάλληλο γιατρό και δείτε αναλυτικά το προφίλ του.</p>
  </div>

  <div class="results-card">
    <div class="sort-row">
      <span>Ταξινόμηση κατά:</span>

      <button type="button" class="sort-chip active-chip">
        Σχετικότητα
      </button>

      <button type="button" class="sort-chip">
        Κριτικές
      </button>

      <button type="button" class="sort-chip">
        Όνομα Α-Ω
      </button>
    </div>

    @if (pagedDoctors && pagedDoctors.length > 0) {
      <section class="doctor-grid">
        @for (doc of pagedDoctors; track doc.id) {
          <app-doctor-result-card
            [doctor]="doc"
            (cardClicked)="onCardClicked(doc.id)"
          ></app-doctor-result-card>
        }
      </section>

      <div class="pagination-wrapper">
        <p-paginator
          (onPageChange)="onPage($event)"
          [first]="first"
          [rows]="rows"
          [totalRecords]="doctors?.length ?? 0"
          [rowsPerPageOptions]="[5, 10, 20]"
        ></p-paginator>
      </div>
    } @else {
      <div class="empty-state">
        Δεν βρέθηκαν διαθέσιμοι γιατροί.
      </div>
    }
  </div>
</section>
