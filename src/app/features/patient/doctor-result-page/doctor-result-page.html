<section class="doctor-results-page">
  <div class="page-header">
    <h1>Συνεργαζόμενοι ιατροί</h1>
    <p>Βρείτε τον κατάλληλο γιατρό και δείτε αναλυτικά το προφίλ του.</p>
  </div>

  <div class="results-card">
    <div class="filters-row">
      <p-autoComplete
        [(ngModel)]="selectedSpecialty"
        [suggestions]="filteredSpecialties"
        (completeMethod)="filterSpecialties($event)"
        (onSelect)="applyFilters()"
        (onClear)="applyFilters()"
        [minLength]="1"
        field="name"
        optionLabel="name"
        dataKey="id"
        placeholder="Ειδικότητα">
      </p-autoComplete>

      <p-autoComplete
        [(ngModel)]="selectedLocation"
        [suggestions]="locationSuggestions"
        (completeMethod)="filterLocations($event)"
        (onSelect)="applyFilters()"
        (onClear)="applyFilters()"
        [minLength]="3"
        field="displayName"
        optionLabel="displayName"
        placeholder="Τοποθεσία πχ. Αθήνα">
      </p-autoComplete>

      <button type="button" class="filter-search-button" (click)="applyFilters()">
        <i class="pi pi-search"></i>
      </button>
    </div>

    @if (doctorLoadError) {
      <div class="filter-error">{{ doctorLoadError }}</div>
    }

    <div class="sort-row">
      <span>Ταξινόμηση κατά:</span>
      
      <button
        type="button"
        class="sort-chip"
        [class.active-chip]="sortBy === 'reviews'"
        (click)="setSortBy('reviews')">
        Κριτικές
      </button>

      <button
        type="button"
        class="sort-chip"
        [class.active-chip]="sortBy === 'name'"
        (click)="setSortBy('name')">
        Όνομα Α-Ω
      </button>
    </div>

    @if (pagedDoctors && pagedDoctors.length > 0) {
      <section class="doctor-grid">
        @for (doc of pagedDoctors; track doc.id) {
          <app-doctor-result-card
            [doctor]="doc"
            (cardClicked)="onCardClicked(doc.id)"
          ></app-doctor-result-card>
        }
      </section>

      <div class="pagination-wrapper">
        <p-paginator
          (onPageChange)="onPage($event)"
          [first]="first"
          [rows]="rows"
          [totalRecords]="doctors.length"
        ></p-paginator>
      </div>
    } @else {
      <div class="empty-state">
        Δεν βρέθηκαν διαθέσιμοι γιατροί.
      </div>
    }
  </div>
</section>
