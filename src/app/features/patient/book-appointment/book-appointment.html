<section class="book-appointment-page">
  <div class="page-header">
    <h1>Το αίτημά σας</h1>
    <p>Συμπληρώστε τα στοιχεία για να ολοκληρώσετε την αίτηση για ραντεβού.</p>
  </div>

  <form
    class="book-card"
    [formGroup]="appointmentForm"
    (ngSubmit)="submitAppointment()"
  >
    @if (userDetailedInfo) {
      <app-doctor-basic-info [userDetailedInfo]="userDetailedInfo"></app-doctor-basic-info>
    }

    <div class="reason-section">
      <label for="reason">Λόγος επίσκεψης*</label>

      <textarea
        id="reason"
        name="reason"
        rows="4"
        formControlName="reason"
      ></textarea>
    </div>

    <app-doctor-availability-patient-side
      (slotSelected)="closedSlot = $event"
    ></app-doctor-availability-patient-side>

    <div class="form-actions">
      <button
        type="button"
        class="cancel-button"
        (click)="goBack()"
      >
        Ακύρωση
      </button>

      <button
        type="submit"
        class="submit-button"
      >
        Υποβολή αιτήματος
      </button>
    </div>
  </form>
</section>
