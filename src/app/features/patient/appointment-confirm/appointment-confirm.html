<div class="container py-5">

    <!-- Page Title -->
    <section class="mb-5 text-center">
        <h1 class="display-6 fw-bold text-primary">
            Το αίτημα σας - Επιβεβαίωση
        </h1>
        <p class="text-muted">
            Ελέγξτε τα στοιχεία πριν την επιβεβαίωση.
        </p>
    </section>

    <!-- Main Card -->
    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body p-4 p-md-5">

            <!-- Doctor Info -->
            @if (userDetailedInfo) {
            <section class="mb-5">
                <div class="border rounded-4 p-4 bg-light">
                    <h2 class="h4 fw-semibold mb-4 text-secondary">
                        Στοιχεία Γιατρού
                    </h2>

                    <app-doctor-basic-info [userDetailedInfo]="userDetailedInfo">
                    </app-doctor-basic-info>
                </div>
            </section>
            }

            <!-- Message Section -->
            <section class="mb-5">
                <div class="border rounded-4 p-4">
                    <h2 class="h4 fw-semibold mb-3 text-secondary">
                        Το μήνυμα σας
                    </h2>

                    <p class="mb-0 text-muted">
                        insert message here
                    </p>
                </div>
            </section>

            <!-- Availability -->
            <section class="mb-5">
                <div class="border rounded-4 p-4 bg-light">
                    <h2 class="h4 fw-semibold mb-4 text-secondary">
                        Διαθεσιμότητα Γιατρού
                    </h2>
                    <p class="mb-0 text-muted">
                        insert message here
                    </p>
                </div>
            </section>

            <!-- Buttons -->
            <section class="d-flex justify-content-between gap-3">
                <button class="btn btn-outline-secondary px-4 py-2">
                    Πίσω
                </button>

                <button class="btn btn-primary px-4 py-2">
                    Επιβεβαίωση
                </button>
            </section>

        </div>
    </div>
</div>
