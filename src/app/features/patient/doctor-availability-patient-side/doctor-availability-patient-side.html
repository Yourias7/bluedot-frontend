<section class="patient-availability">
  <div class="availability-header">
    <h2>Διαθεσιμότητες</h2>
    <p>Επιλέξτε ημέρα και διαθέσιμη ώρα για το ραντεβού σας.</p>
  </div>

  <div class="date-box">
    <label for="availability-date">Ημερομηνία</label>
    <input id="availability-date" type="date">
  </div>

  <div class="slots-grid">
    @for (slot of availabilitySlots; track slot.id) {
      @if (slot.status === 'free') {
        <button
          type="button"
          class="slot-card"
          [class.selected-slot]="selectedSlot?.id === slot.id"
          (click)="pickSlot(slot.id)"
        >
          {{ slot.startTime }} - {{ slot.endTime }}
        </button>
      }
    }
  </div>
</section>
