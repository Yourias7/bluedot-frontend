<section class="availability-page">
  <div class="page-header">
    <div>
      <h2>Διαθεσιμότητες</h2>
      <p>Selected day:</p>
    </div>
  </div>

  <div class="content-card">
    <div class="date-box">
      <label>Date</label>
      <input type="date">
    </div>
    <br>
    <div class="card slots-grid d-flex flex-row gap-3 flex-wrap justify-content-center">
      @for (slot of availabilitySlots; track slot.id) {
        @if (slot.status == 'free') { <!-- Display free slots -->
          <button (click)="pickSlot(slot.id)" class="btn" [ngClass]="{'btn-primary': selectedSlot?.id === slot.id}">
          <span>{{ slot.startTime }} - {{ slot.endTime }}</span>
        </button>
        }
        
      }
    </div>
  </div>

  @if (showSlotMenu && selectedSlot !== null) {
  <div
    class="slot-menu"
    [style.left.px]="menuX"
    [style.top.px]="menuY"
    (click)="$event.stopPropagation()"
  >

  </div>
}
</section>
