<p-dialog header="Σύνδεση χρήστη" [modal]="true" [(visible)]="isOpen" [style]="{ width: '25rem' }" (onHide)="handleHide()">
    @if (hasFailedLogin) {
        <p>Λανθασμένο email ή κωδικός.</p>
    }
    <form class="d-flex flex-column">
        <div class="p-field d-flex flex-column">
            <label for="username">Όνομα χρήστη </label>
            <input id="username" type="text" name="username" />
        </div>
        <div class="p-field d-flex flex-column">
            <label for="password">Κωδικός πρόσβασης (Password)</label>
            <input id="password" type="password" name="password" />
        </div>
        <br>
        <div class="p-field">
            <button type="submit" class="p-button p-button-primary">Σύνδεση</button>
        </div>
    </form>
    <div>
        <a (click)="redirect()">Δεν έχεις λογαριασμό; Εγγράψου</a>
    </div>
</p-dialog>
