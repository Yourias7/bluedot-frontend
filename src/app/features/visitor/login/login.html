<p-dialog header="Σύνδεση χρήστη" [modal]="true" [(visible)]="isOpen" [style]="{ width: '25rem' }"
    (onHide)="isOpen=false">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="d-flex flex-column">
        <div class="p-field d-flex flex-column mb-3">
            <label for="email">Email</label>
            <input id="email" type="email" formControlName="email" class="p-inputtext" />
        </div>
        <div class="p-field d-flex flex-column mb-3">
            <label for="password">Κωδικός πρόσβασης (Password)</label>
            <input id="password" type="password" formControlName="password" class="p-inputtext" />
        </div>

        <div class="p-field mt-3">
            <button type="submit" pButton class="p-button p-button-primary w-100"
                [disabled]="loginForm.invalid">Σύνδεση</button>
        </div>
    </form>
    <div class="mt-3 text-center">
        <a routerLink="/register" (click)="goToRegister()"
            style="cursor: pointer; text-decoration: none; color: var(--primary-color);">
            Δεν έχεις λογαριασμό; Εγγράψου
        </a>
    </div>
</p-dialog>
