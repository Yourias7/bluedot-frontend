<h1>Εγγραφή χρήστη</h1>
<section class="container mt-4">
    <p-tabs value="0" class="mb-3">
        <p-tablist>
            <p-tab value="0">Ψάχνω γιατρό</p-tab>
            <p-tab value="1">Είμαι γιατρός</p-tab>
        </p-tablist>
        <p-tabpanel value="0">
            <form [formGroup]="patient_registerForm" (ngSubmit)="onSubmit()">
                <app-register-common-fields [formGroup]="patient_registerForm"></app-register-common-fields>
                <div class="mb-3">
                    <label for="telephone" class="form-label">Τηλέφωνο</label>
                    <input id="telephone" formControlName="phone" type="text" class="form-control" />
                </div>
                <div>
                    <input type="checkbox" formControlName="terms">
                    <label for="checkbox">Έχω διαβάσει και αποδεχθεί τους Όρους Χρήσης</label>
                    <br>
                </div>
                <button type="submit" [disabled]="patient_registerForm.invalid" class="register-button">Εγγραφή</button>
            </form>
        </p-tabpanel>
        <p-tabpanel value="1">
            <form [formGroup]="doctor_registerForm" (ngSubmit)="onSubmit()">
                <app-register-common-fields [formGroup]="doctor_registerForm"></app-register-common-fields>
                <div>
                    <label for="specialization" class="form-label">Ειδικότητα</label>
                    <div class="card flex justify-center">
                        <p-listbox [options]="items" formControlName="specialization" [filter]="true" [checkbox]="true"
                            optionLabel="name" [virtualScroll]="true" [virtualScrollItemSize]='40'
                            [metaKeySelection]="false" scrollHeight="250px" [striped]="true" class="w-full md:w-56"></p-listbox>
                    </div>

                    <!--FIXME-->
                    <div class="mb-3">
                        <label for="phone" class="form-label">Τηλέφωνο</label>
                        <input id="phone" formControlName="phone" type="text" class="form-control" />
                        @if(doctor_registerForm.get("phone")?.touched){
                        @if(doctor_registerForm.get("phone")?.hasError("required")) {
                        <div class="form-error">Email is required.</div>
                        } @else if (doctor_registerForm.get("phone")?.hasError("pattern")) {
                        <div class="form-error">Please enter a valid email address.</div>
                        }
                        }
                    </div>
                   <!--  <div class="mb-3">
                        <label for="bio" class="form-label">Γενικές πληροφορίες</label>
                        <textarea id="bio" formControlName="bio" type="text" class="form-control"></textarea>
                    </div> -->
                </div>
                <div>
                    <input type="checkbox" formControlName="terms">
                    <label for="checkbox">Έχω διαβάσει και αποδεχθεί τους Όρους Χρήσης</label>
                    <br>
                </div>
                <button type="submit" [disabled]="doctor_registerForm.invalid" class="register-button">Εγγραφή</button>
            </form>
        </p-tabpanel>
    </p-tabs>
    <!--   -->

</section>
