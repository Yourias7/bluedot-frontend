<section class="availability-page" (click)="closeSlotMenu()">
  <div class="page-header">
    <div>
      <h1>Availability</h1>
      <p>Selected day: {{ selectedDate }}</p>
    </div>
  </div>

  <div class="content-card">
    <div class="date-box">
      <label>Date</label>
      <input type="text" [value]="selectedDate" readonly>
    </div>

    <div class="slots-grid">
      @for (slot of availabilitySlots; track slot.id) {
        <button
          class="slot-card"
          [class.free-slot]="slot.status === 'free'"
          [class.pending-slot]="slot.status === 'pending'"
          [class.booked-slot]="slot.status === 'booked'"
          [class.disabled-slot]="slot.status === 'disabled'"
          (click)="openSlot(slot)"
          (contextmenu)="openSlotMenu($event, slot)"
        >
          <span class="slot-icon">▣</span>
          <span>{{ slot.startTime }} - {{ slot.endTime }}</span>
        </button>
      }
    </div>
  </div>

  @if (showSlotMenu && selectedSlot !== null) {
  <div
    class="slot-menu"
    [style.left.px]="menuX"
    [style.top.px]="menuY"
    (click)="$event.stopPropagation()"
  >
    @if (selectedSlot.status === 'free') {
      <button type="button" (click)="disableSlot()">
        Disable slot
      </button>
    }

    @if (selectedSlot.status === 'disabled') {
      <button type="button" (click)="enableSlot()">
        Enable slot
      </button>
    }
  </div>
}
</section>
