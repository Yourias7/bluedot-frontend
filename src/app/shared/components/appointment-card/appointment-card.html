<article class="card" (click)="sendMessage()">
  <div class="card-body d-flex align-items-center justify-content-between">
    <div>
      <div class="h6 mb-1">{{ appointment.specialty }}</div>
      <div class="text-muted small mb-1">{{ appointment.date }}</div>
      <div class="text-muted small">{{ appointment.startTime }} - {{ appointment.endTime }}</div>
    </div>
    <i class="pi pi-calendar fs-1 text-primary"></i>
  </div>
</article>
