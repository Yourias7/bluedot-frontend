<div class="delete-account-wrapper">
  <button
    type="button"
    class="btn btn-danger"
    (click)="openDialog()"
  >
    Διαγραφή λογαριασμού
  </button>

  <p-dialog
    header="Διαγραφή λογαριασμού"
    [modal]="true"
    [(visible)]="visible"
    [style]="{ width: '25rem' }"
    [closable]="!isDeleting"
  >
    <span class="text-secondary d-block mb-3">
      Προσοχή! Η διαγραφή του λογαριασμού είναι οριστική. Είστε σίγουροι ότι θέλετε να συνεχίσετε;
    </span>

    @if (errorMessage) {
      <div class="delete-error">
        {{ errorMessage }}
      </div>
    }

    <div class="d-flex justify-content-end gap-2">
      <button
        type="button"
        class="btn btn-secondary"
        [disabled]="isDeleting"
        (click)="closeDialog()"
      >
        Ακύρωση
      </button>

      <button
        type="button"
        class="btn btn-danger"
        [disabled]="isDeleting"
        (click)="deleteAccount()"
      >
        @if (isDeleting) {
          Διαγραφή...
        } @else {
          Διαγραφή λογαριασμού
        }
      </button>
    </div>
  </p-dialog>
</div>
